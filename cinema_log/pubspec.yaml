name: cinema_log
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  build_runner: ^2.13.1
  cloud_firestore: ^6.1.3
  envied: ^1.3.4
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  simple_gradient_text: 1.4.0
  

dev_dependencies:
  flutter_launcher_icons: ^0.14.4

  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/White_Video-icon.png"
  min_sdk_android: 21 
  web:
    generate: true
    image_path: "assets/White_Video-icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/White_Video-icon.png"
    icon_size: 48 
  macos:
    generate: true
    image_path: "assets/White_Video-icon.png"

flutter:
  uses-material-design: true
