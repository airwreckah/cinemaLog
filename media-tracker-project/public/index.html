<!DOCTYPE html>
<html>

<head>
<title>Media Tracker</title>

<style>
body{
font-family: Arial;
max-width:900px;
margin:auto;
}

img{
width:150px;
}

.card{
border:1px solid #ccc;
padding:15px;
margin:10px 0;
}
</style>

</head>

<body>

<h1>Media Tracker</h1>

<input id="searchInput" placeholder="Search movies or TV shows">
<button onclick="searchMedia()">Search</button>

<h2>Results</h2>
<div id="results"></div>

<h2>Your Tracker</h2>
<div id="tracker"></div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
getDoc,
deleteDoc,
updateDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "YOUR_FIREBASE_KEY",
authDomain: "test-c4d9f.firebaseapp.com",
projectId: "test-c4d9f",
storageBucket: "test-c4d9f.firebasestorage.app",
messagingSenderId: "453541164446",
appId: "1:453541164446:web:66077dd788501ecdf7528f"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* TMDB API */

const API_KEY = "e7d7f274b57eea7f8d7c9a51361d201d";


/* SEARCH MOVIES + TV */

window.searchMedia = async function(){

const searchText = document.getElementById("searchInput").value;

const url =
`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${searchText}`;

const response = await fetch(url);
const data = await response.json();

const results = document.getElementById("results");
results.innerHTML = "";

data.results.forEach(item => {

if(item.media_type === "person") return;

const title = item.title || item.name;
const type = item.media_type === "movie" ? "Movie" : "TV Show";

const poster = item.poster_path
? `https://image.tmdb.org/t/p/w200${item.poster_path}`
: "";

const overview = item.overview || "No summary available";

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>${title}</h3>
<p><b>Type:</b> ${type}</p>
<img src="${poster}">
<p>${overview}</p>
`;

const button = document.createElement("button");
button.textContent = "Add to Tracker";

button.onclick = () => addToTracker(item);

card.appendChild(button);

results.appendChild(card);

});

};


/* ADD MEDIA */

async function addMedia(item){

const title = item.title || item.name;
const type = item.media_type;

const mediaRef = collection(db,"media");

const q = query(
mediaRef,
where("title","==",title),
where("type","==",type)
);

const snapshot = await getDocs(q);

if(!snapshot.empty){

return snapshot.docs[0].id;

}

const docRef = await addDoc(mediaRef,{

title: title,
type: type,
poster: item.poster_path,
overview: item.overview,
release: item.release_date || item.first_air_date,
status: "Plan to Watch"

});

return docRef.id;

}


/* ADD TO TRACKER LIST */

async function addToTracker(item){

const mediaId = await addMedia(item);

const listRef = collection(db,"customListMedia");

const q = query(
listRef,
where("media_id","==",mediaId)
);

const snapshot = await getDocs(q);

if(!snapshot.empty){

alert("Already in tracker");
return;

}

await addDoc(listRef,{

list_id: "favorites",
media_id: mediaId

});

loadTracker();

}


/* REMOVE */

window.removeFromTracker = async function(relationId){

await deleteDoc(doc(db,"customListMedia",relationId));

loadTracker();

};


/* UPDATE STATUS */

window.updateStatus = async function(mediaId,status){

await updateDoc(doc(db,"media",mediaId),{
status:status
});

loadTracker();

};


/* LOAD TRACKER */

async function loadTracker(){

const tracker = document.getElementById("tracker");
tracker.innerHTML = "";

const relations = await getDocs(collection(db,"customListMedia"));

for(const relation of relations.docs){

const mediaId = relation.data().media_id;

const mediaDoc = await getDoc(doc(db,"media",mediaId));
const data = mediaDoc.data();

const poster =
data.poster
? `https://image.tmdb.org/t/p/w200${data.poster}`
: "";

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>${data.title}</h3>

<p>Status: ${data.status}</p>

<select onchange="updateStatus('${mediaId}',this.value)">
<option ${data.status=="Plan to Watch"?"selected":""}>Plan to Watch</option>
<option ${data.status=="Watching"?"selected":""}>Watching</option>
<option ${data.status=="Completed"?"selected":""}>Completed</option>
</select>

<br><br>

<img src="${poster}">

<p>${data.overview}</p>

<button onclick="removeFromTracker('${relation.id}')">
Remove
</button>
`;

tracker.appendChild(card);

}

}


/* LOAD ON START */

loadTracker();

</script>

</body>
</html>
